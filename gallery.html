<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRAKEN — Галерея</title>
<link rel="icon" href="1.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --display:'Space Grotesk', sans-serif;
    --mono:'JetBrains Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#ffffff;
    color:#111111;
    font-family:var(--display);
    min-height:100svh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;}

  /* ---------- nav (matches index.html) ---------- */
  nav{
    position:relative;
    z-index:5;
    background:#ffffff;
    border-bottom:1px solid #ddd;
    padding:18px clamp(18px,4vw,42px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    min-height:160px;
    box-shadow:0 8px 30px rgba(0,0,0,.04);
  }
  nav .logo-mark{
    display:block;
    width:auto;
    height:clamp(150px,12vw,220px);
    object-fit:contain;
    flex-shrink:0;
    transition:transform .25s ease;
  }
  nav .logo-mark:hover{transform:scale(1.03);}
  nav .nav-right{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .pill-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#000000;
    color:#ffffff;
    border:none;
    border-radius:100px;
    padding:11px 20px;
    font-family:var(--display);
    font-weight:700;
    font-size:13.5px;
    letter-spacing:.01em;
    transition:background .25s ease;
    white-space:nowrap;
  }
  .pill-btn:hover{background:#222;}
  .pill-btn svg{flex-shrink:0;}
  .icon-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:42px;height:42px;
    border-radius:100px;
    background:#000000;
    border:1px solid #000000;
    color:#ffffff;
    transition:background .25s ease, border-color .25s ease;
    flex-shrink:0;
  }
  .icon-btn:hover{border-color:#d8d8d8;}
  @media (max-width:768px){
    nav{min-height:120px;padding:16px 18px;}
    nav .logo-mark{height:90px;}
  }
  @media (max-width:480px){
    .pill-btn span.label{display:none;}
    .pill-btn{padding:11px;}
  }

  /* ---------- page shell ---------- */
  main{
    max-width:1400px;
    margin:0 auto;
    padding:clamp(40px,6vw,80px) clamp(20px,5vw,64px) 100px;
  }
  .back-link{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:var(--mono);
    font-size:13px;
    color:#555;
    margin-bottom:32px;
    transition:color .2s ease;
  }
  .back-link:hover{color:#111;}

  h1.page-title{
    font-weight:700;
    font-size:clamp(36px,6vw,68px);
    letter-spacing:-.02em;
    line-height:1.05;
    margin-bottom:20px;
  }

  /* editable text block — put your own copy here */
  .intro-text{
    max-width:720px;
    font-size:clamp(16px,1.8vw,19px);
    line-height:1.7;
    color:#333;
    margin-bottom:56px;
  }
  .intro-text p + p{margin-top:16px;}

  /* ---------- image gallery ---------- */
  .gallery-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:18px;
  }
  .gallery-grid figure{
    margin:0;
    border:1px solid #eaeaea;
    border-radius:14px;
    overflow:hidden;
    background:#fafafa;
  }
  .gallery-grid img{
    display:block;
    width:100%;
    height:100%;
    aspect-ratio:1/1;
    object-fit:cover;
  }
  .gallery-grid figure:first-child{
    grid-column:span 2;
    grid-row:span 2;
  }
  .gallery-grid figure:first-child img{aspect-ratio:auto;height:100%;}

  @media (max-width:900px){
    .gallery-grid{grid-template-columns:repeat(2,1fr);}
    .gallery-grid figure:first-child{grid-column:span 2;grid-row:span 1;}
    .gallery-grid figure:first-child img{aspect-ratio:16/10;}
  }
  @media (max-width:520px){
    .gallery-grid{grid-template-columns:1fr;}
    .gallery-grid figure:first-child{grid-column:span 1;}
  }
</style>
</head>
<body>

  <nav>
    <img src="1.png" alt="KRAKEN" class="logo-mark">
    <div class="nav-right">
      <a class="pill-btn" data-cta="assortment" href="#" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"></rect>
          <rect x="14" y="3" width="7" height="7" rx="1.5"></rect>
          <rect x="3" y="14" width="7" height="7" rx="1.5"></rect>
          <rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
        </svg>
        <span class="label">Ассортимент</span>
      </a>
      <a class="icon-btn" data-cta="manager" href="#" target="_blank" rel="noopener" aria-label="Менеджер" title="Менеджер">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="7" x2="14" y2="7"></line>
          <line x1="4" y1="12" x2="20" y2="12"></line>
          <line x1="4" y1="17" x2="16" y2="17"></line>
        </svg>
      </a>
    </div>
  </nav>

  <main>
    <a href="index.html" class="back-link">← На главную</a>

    <h1 class="page-title">Галерея нашего товара</h1>

    <!-- ================================================
         ВАШ ТЕКСТ — замените этот блок своим текстом
         ================================================ -->
    <div class="intro-text">
      <p>Наш товар имеет высшее качество, экспорт более чем из 10 стран!</p>
    </div>

    <!-- ================================================
         ГАЛЕРЕЯ — картинки 2.png...6.png
         Просто замените файлы 2.png, 3.png, 4.png, 5.png, 6.png
         на свои — расположение обновится само.
         ================================================ -->
    <div class="gallery-grid">
      <figure><img src="2.png" alt="Изображение 2"></figure>
      <figure><img src="3.png" alt="Изображение 3"></figure>
      <figure><img src="4.png" alt="Изображение 4"></figure>
      <figure><img src="5.png" alt="Изображение 5"></figure>
      <figure><img src="6.png" alt="Изображение 6"></figure>
    </div>
  </main>

<script>
  const CONFIG = {
    assortmentUrl: "https://teletype.in/@bless-yo-trap/T_jMiz2CQbh",
    managerUrl:    "https://t.me/krkn_oper"
  };
  document.querySelectorAll('[data-cta="assortment"]').forEach(el => el.href = CONFIG.assortmentUrl);
  document.querySelectorAll('[data-cta="manager"]').forEach(el => el.href = CONFIG.managerUrl);
</script>
</body>
</html>
