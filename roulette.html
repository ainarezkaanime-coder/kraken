<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRAKEN — Рулетка</title>
<link rel="icon" href="1.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --display:'Space Grotesk', sans-serif;
    --mono:'JetBrains Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#ffffff;
    color:#111111;
    font-family:var(--display);
    min-height:100svh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit;text-decoration:none;}

  /* ---------- nav (matches index.html) ---------- */
  nav{
    position:relative;
    z-index:5;
    background:#ffffff;
    border-bottom:1px solid #ddd;
    padding:18px clamp(18px,4vw,42px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    min-height:160px;
    box-shadow:0 8px 30px rgba(0,0,0,.04);
  }
  nav .logo-mark{
    display:block;
    width:auto;
    height:clamp(150px,12vw,220px);
    object-fit:contain;
    flex-shrink:0;
    transition:transform .25s ease;
  }
  nav .logo-mark:hover{transform:scale(1.03);}
  nav .nav-right{display:flex;align-items:center;gap:10px;}
  .pill-btn{
    display:inline-flex;align-items:center;gap:8px;
    background:#000;color:#fff;border:none;border-radius:100px;
    padding:11px 20px;font-family:var(--display);font-weight:700;
    font-size:13.5px;letter-spacing:.01em;transition:background .25s ease;white-space:nowrap;
  }
  .pill-btn:hover{background:#222;}
  .icon-btn{
    display:inline-flex;align-items:center;justify-content:center;
    width:42px;height:42px;border-radius:100px;background:#000;
    border:1px solid #000;color:#fff;transition:background .25s ease, border-color .25s ease;flex-shrink:0;
  }
  .icon-btn:hover{border-color:#d8d8d8;}
  @media (max-width:768px){
    nav{min-height:120px;padding:16px 18px;}
    nav .logo-mark{height:74px;}
    nav .nav-right{gap:8px;}
    .icon-btn{width:38px;height:38px;}
  }
  @media (max-width:480px){
    nav{flex-wrap:wrap;row-gap:10px;min-height:0;}
    nav .logo-mark{height:56px;}
    .pill-btn span.label{display:none;}
    .pill-btn{padding:11px;}
  }

  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background:linear-gradient(#efefef 1px,transparent 1px),linear-gradient(90deg,#efefef 1px,transparent 1px);
    background-size:48px 48px;opacity:.6;z-index:-1;
  }
  body::after{
    content:"";position:fixed;inset:18px;border:1px solid #e6e6e6;pointer-events:none;z-index:10;
  }

  /* ---------- page shell ---------- */
  main{max-width:900px;margin:0 auto;padding:clamp(32px,5vw,56px) clamp(20px,5vw,64px) 100px;}

  .page-head{display:flex;align-items:flex-start;gap:18px;margin-bottom:8px;}
  .back-btn{
    display:inline-flex;align-items:center;justify-content:center;
    width:44px;height:44px;border-radius:100px;background:#000;color:#fff;
    flex-shrink:0;transition:background .2s ease;margin-top:4px;
  }
  .back-btn:hover{background:#222;}
  .page-title{font-weight:700;font-size:clamp(30px,5vw,44px);letter-spacing:-.02em;line-height:1.1;}
  .page-sub{color:#666;font-size:15px;margin-top:6px;}

  /* ---------- wheel ---------- */
  .wheel-wrap{
    position:relative;
    width:min(420px, 88vw);
    margin:44px auto 30px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .chase-lights{
    position:absolute;
    inset:-14px;
    border-radius:50%;
    pointer-events:none;
    z-index:1;
  }
  .chase-lights i{
    position:absolute;
    width:8px;height:8px;
    border-radius:50%;
    background:#0a0a0a;
    top:50%;left:50%;
    margin:-4px;
    opacity:.22;
    animation:chaseBlink 1.6s ease-in-out infinite;
  }
  @keyframes chaseBlink{
    0%,100%{opacity:.15;transform:scale(1);}
    50%{opacity:1;transform:scale(1.25);}
  }
  .pointer{
    position:absolute;
    top:-10px;left:50%;
    transform:translateX(-50%);
    width:38px;height:38px;
    z-index:6;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.3));
    animation:pointerNudge 2.2s ease-in-out infinite;
  }
  @keyframes pointerNudge{
    0%,80%,100%{transform:translateX(-50%) rotate(0deg);}
    85%{transform:translateX(-50%) rotate(-8deg);}
    92%{transform:translateX(-50%) rotate(6deg);}
    96%{transform:translateX(-50%) rotate(-3deg);}
  }
  #wheelSvg{
    width:100%;height:auto;
    display:block;
    position:relative;
    z-index:2;
    transition:transform 5s cubic-bezier(.11,.74,.09,1);
    transform:rotate(0deg);
    filter:drop-shadow(0 18px 34px rgba(0,0,0,.22));
  }
  .wheel-center-btn{
    position:absolute;
    width:27%;height:27%;
    border-radius:50%;
    background:#0a0a0a;
    color:#fff;
    border:5px solid #fff;
    box-shadow:0 0 0 2px #0a0a0a, 0 8px 24px rgba(0,0,0,.35);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:var(--display);
    font-weight:700;
    font-size:clamp(12px,2.2vw,15px);
    letter-spacing:.02em;
    text-transform:uppercase;
    cursor:pointer;
    z-index:5;
    transition:transform .15s ease, background .2s ease;
    text-align:center;
    line-height:1.15;
    padding:4px;
  }
  .ring-spin{
    position:absolute;
    width:34%;height:34%;
    border-radius:50%;
    border:2px dashed rgba(10,10,10,.25);
    z-index:4;
    animation:ringRotate 9s linear infinite;
  }
  @keyframes ringRotate{ to{ transform:rotate(360deg); } }
  .wheel-center-btn:active{transform:scale(.94);}
  .wheel-center-btn.disabled{
    cursor:not-allowed;
    background:#4a4a4a;
    font-size:11px;
  }
  .wheel-center-btn.spinning{background:#0a0a0a;}

  @keyframes pulseGlow{
    0%,100%{ box-shadow:0 0 0 2px #0a0a0a, 0 8px 24px rgba(0,0,0,.35); }
    50%{ box-shadow:0 0 0 2px #0a0a0a, 0 8px 34px rgba(0,0,0,.55); }
  }
  .wheel-center-btn:not(.disabled){animation:pulseGlow 2.4s ease-in-out infinite;}

  /* result banner */
  .result-banner{
    position:relative;
    max-width:460px;
    margin:0 auto 8px;
    background:#0a0a0a;
    color:#fff;
    border-radius:18px;
    padding:28px 24px 26px;
    text-align:center;
    opacity:0;
    transform:translateY(14px) scale(.92);
    transition:opacity .5s cubic-bezier(.2,.8,.2,1), transform .5s cubic-bezier(.2,.8,.2,1);
    pointer-events:none;
    overflow:hidden;
    isolation:isolate;
  }
  .result-banner.show{opacity:1;transform:translateY(0) scale(1);}
  .result-banner::before{
    content:'';
    position:absolute;
    inset:-40%;
    background:radial-gradient(circle, rgba(255,255,255,.16) 0%, transparent 60%);
    opacity:0;
    z-index:-1;
  }
  .result-banner.show::before{
    animation:glowPulse 1.8s ease-out .1s;
  }
  @keyframes glowPulse{
    0%{opacity:0;transform:scale(.4);}
    35%{opacity:1;}
    100%{opacity:0;transform:scale(1.3);}
  }
  .result-banner::after{
    content:'';
    position:absolute;
    top:0;left:-60%;
    width:40%;height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,.16), transparent);
    transform:skewX(-20deg);
    opacity:0;
  }
  .result-banner.show::after{
    animation:shineSweep 1.1s ease-out .35s;
  }
  @keyframes shineSweep{
    0%{left:-60%;opacity:0;}
    15%{opacity:1;}
    100%{left:130%;opacity:0;}
  }
  .rb-icon{
    font-size:38px;
    line-height:1;
    margin-bottom:10px;
    opacity:0;
    transform:scale(.3) translateY(6px);
  }
  .result-banner.show .rb-icon{
    animation:iconPop .6s cubic-bezier(.2,1.4,.4,1) .05s forwards;
  }
  @keyframes iconPop{
    0%{opacity:0;transform:scale(.3) translateY(6px);}
    60%{opacity:1;transform:scale(1.15) translateY(0);}
    100%{opacity:1;transform:scale(1) translateY(0);}
  }
  .result-banner .rb-label{
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#9a9a9a;margin-bottom:6px;
    opacity:0;
    transform:translateY(6px);
  }
  .result-banner.show .rb-label{
    animation:fadeUp .5s ease .22s forwards;
  }
  .result-banner .rb-prize{
    font-weight:700;font-size:clamp(20px,3vw,26px);
    opacity:0;
    transform:translateY(10px);
  }
  .result-banner.show .rb-prize{
    animation:fadeUp .55s ease .34s forwards;
  }
  @keyframes fadeUp{
    to{opacity:1;transform:translateY(0);}
  }

  /* confetti */
  .confetti-piece{
    position:fixed;
    top:-16px;
    width:8px;height:8px;
    z-index:200;
    pointer-events:none;
    will-change:transform, opacity;
  }

  .info-banner{
    display:flex;align-items:center;gap:12px;
    background:#f6f6f6;border-radius:14px;
    padding:16px 18px;
    font-size:14px;
    color:#333;
    margin:34px 0 8px;
  }
  .info-banner svg{flex-shrink:0;color:#555;}
  .info-banner b{font-weight:700;}
  .info-banner.countdown{background:#0a0a0a;color:#fff;}
  .info-banner.countdown b{font-variant-numeric:tabular-nums;}

  /* prize list */
  .prize-list{margin-top:38px;}
  .prize-list h3{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:#888;
    margin-bottom:14px;
  }
  .prize-row{
    display:flex;align-items:center;gap:14px;
    padding:14px 4px;
    border-bottom:1px solid #eee;
  }
  .prize-row:last-child{border-bottom:none;}
  .prize-icon{
    width:38px;height:38px;border-radius:50%;
    background:#f4f4f4;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;flex-shrink:0;
  }
  .prize-name{flex:1;font-size:15px;}
  .prize-pct{font-weight:700;font-size:15px;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important;}
  }
</style>
</head>
<body>

  <nav>
    <img src="1.png" alt="KRAKEN" class="logo-mark">
    <div class="nav-right">
      <a class="pill-btn" data-cta="assortment" href="#" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"></rect>
          <rect x="14" y="3" width="7" height="7" rx="1.5"></rect>
          <rect x="3" y="14" width="7" height="7" rx="1.5"></rect>
          <rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
        </svg>
        <span class="label">Ассортимент</span>
      </a>
      <a class="icon-btn" data-cta="manager" href="#" target="_blank" rel="noopener" aria-label="Менеджер" title="Менеджер">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="7" x2="14" y2="7"></line>
          <line x1="4" y1="12" x2="20" y2="12"></line>
          <line x1="4" y1="17" x2="16" y2="17"></line>
        </svg>
      </a>
      <a class="icon-btn" href="gallery.html" aria-label="Галерея" title="Галерея">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <path d="M21 15l-5-5L5 21"></path>

    </div>
  </nav>

  <main>
    <div class="page-head">
      <a href="index.html" class="back-btn" aria-label="Назад">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M11 6l-6 6 6 6"></path>
        </svg>
      </a>
      <div>
        <h1 class="page-title">РУЛЕТКА</h1>
        <p class="page-sub">Испытай удачу и получи крутые призы</p>
      </div>
    </div>

    <div class="wheel-wrap">
      <div class="chase-lights" id="chaseLights"></div>
      <svg class="pointer" viewBox="0 0 34 34">
        <path d="M17 30 L4 8 A17 17 0 0 1 30 8 Z" fill="#0a0a0a" stroke="#fff" stroke-width="2"/>
      </svg>
      <svg id="wheelSvg" viewBox="0 0 400 400"></svg>
      <div class="ring-spin"></div>
      <div class="wheel-center-btn" id="spinBtn">КРУТИТЬ</div>
    </div>

    <div class="result-banner" id="resultBanner">
      <div class="rb-icon" id="resultIcon">🎉</div>
      <div class="rb-label">Ваш приз</div>
      <div class="rb-prize" id="resultPrize">—</div>
    </div>

    <div class="info-banner" id="infoBanner">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
      <span id="infoText">Каждый день доступна <b>1 бесплатная попытка</b></span>
    </div>

    <div class="prize-list">
      <h3>Возможные призы</h3>
      <div id="prizeListBody"></div>
    </div>
  </main>

  <audio id="spinAudio" src="1.mp3" preload="auto" loop></audio>

<script>
  const CONFIG = {
    assortmentUrl: "https://teletype.in/@bless-yo-trap/T_jMiz2CQbh",
    managerUrl:    "https://t.me/krkn_oper"
  };
  document.querySelectorAll('[data-cta="assortment"]').forEach(el => el.href = CONFIG.assortmentUrl);
  document.querySelectorAll('[data-cta="manager"]').forEach(el => el.href = CONFIG.managerUrl);

  /* ================= PRIZES (order = wheel order, clockwise from top) ================= */
  const PRIZES = [
    { label:"Скидка 20%",        full:"Скидка 20% на любой товар",   weight:15, icon:"%" },
    { label:"Скидка 15%",        full:"Скидка 15% на любой товар",   weight:20, icon:"%" },
    { label:"Бонус",             full:"Бонус к заказу",              weight:20, icon:"🎁" },
    { label:"Попробуй ещё",      full:"Попробуй ещё раз",            weight:10, icon:"↻" },
    { label:"Скидка 10%",        full:"Скидка 10% на любой товар",   weight:30, icon:"%" },
    { label:"FREE",              full:"Бесплатный товар (рандомный)",weight:5,  icon:"📦" },
  ];
  const SLICE = 360 / PRIZES.length;
  const DARK_A = "#141414", DARK_B = "#0a0a0a";

  /* ---------- build wheel SVG ---------- */
  const svgNS = "http://www.w3.org/2000/svg";
  const wheelSvg = document.getElementById('wheelSvg');
  const CX=200, CY=200, R=190;

  const defs = document.createElementNS(svgNS,'defs');
  const gradA = document.createElementNS(svgNS,'radialGradient');
  gradA.setAttribute('id','segGradA'); gradA.setAttribute('cx','50%'); gradA.setAttribute('cy','50%'); gradA.setAttribute('r','75%');
  gradA.innerHTML = '<stop offset="0%" stop-color="#232323"/><stop offset="100%" stop-color="#0d0d0d"/>';
  const gradB = document.createElementNS(svgNS,'radialGradient');
  gradB.setAttribute('id','segGradB'); gradB.setAttribute('cx','50%'); gradB.setAttribute('cy','50%'); gradB.setAttribute('r','75%');
  gradB.innerHTML = '<stop offset="0%" stop-color="#161616"/><stop offset="100%" stop-color="#000000"/>';
  defs.appendChild(gradA); defs.appendChild(gradB);
  wheelSvg.appendChild(defs);

  function polar(cx,cy,r,angleDeg){
    const rad = (angleDeg-90) * Math.PI/180;
    return [cx + r*Math.cos(rad), cy + r*Math.sin(rad)];
  }

  PRIZES.forEach((p,i)=>{
    const startA = i*SLICE, endA = (i+1)*SLICE;
    const [x1,y1] = polar(CX,CY,R,startA);
    const [x2,y2] = polar(CX,CY,R,endA);
    const largeArc = SLICE > 180 ? 1 : 0;
    const path = document.createElementNS(svgNS,'path');
    path.setAttribute('d', `M${CX},${CY} L${x1},${y1} A${R},${R} 0 ${largeArc} 1 ${x2},${y2} Z`);
    path.setAttribute('fill', i % 2 === 0 ? 'url(#segGradA)' : 'url(#segGradB)');
    path.setAttribute('stroke', '#ffffff');
    path.setAttribute('stroke-width', '2.5');
    wheelSvg.appendChild(path);

    const midA = startA + SLICE/2;
    const [tx,ty] = polar(CX,CY,R*0.62,midA);
    const g = document.createElementNS(svgNS,'g');
    g.setAttribute('transform', `translate(${tx},${ty}) rotate(${midA})`);

    const icon = document.createElementNS(svgNS,'text');
    icon.setAttribute('text-anchor','middle');
    icon.setAttribute('y','-8');
    icon.setAttribute('font-size','22');
    icon.textContent = p.icon;
    g.appendChild(icon);

    const label = document.createElementNS(svgNS,'text');
    label.setAttribute('text-anchor','middle');
    label.setAttribute('y','16');
    label.setAttribute('font-family',"'Space Grotesk', sans-serif");
    label.setAttribute('font-weight','700');
    label.setAttribute('font-size','15');
    label.setAttribute('fill','#ffffff');
    label.textContent = p.label;
    g.appendChild(label);

    wheelSvg.appendChild(g);
  });
  // outer ring
  const ring = document.createElementNS(svgNS,'circle');
  ring.setAttribute('cx',CX); ring.setAttribute('cy',CY); ring.setAttribute('r',R-1.5);
  ring.setAttribute('fill','none'); ring.setAttribute('stroke','#0a0a0a'); ring.setAttribute('stroke-width','5');
  wheelSvg.appendChild(ring);

  /* ---------- decorative chase lights around the rim ---------- */
  (function buildChaseLights(){
    const wrap = document.getElementById('chaseLights');
    const N = 24;
    for(let i=0;i<N;i++){
      const angle = (360/N)*i;
      const dot = document.createElement('i');
      dot.style.left = `${50 + 48*Math.cos((angle-90)*Math.PI/180)}%`;
      dot.style.top  = `${50 + 48*Math.sin((angle-90)*Math.PI/180)}%`;
      dot.style.animationDelay = `${(i/N)*1.6}s`;
      wrap.appendChild(dot);
    }
  })();

  /* ---------- prize list UI ---------- */
  const listBody = document.getElementById('prizeListBody');
  PRIZES.forEach(p=>{
    const row = document.createElement('div');
    row.className = 'prize-row';
    row.innerHTML = `<div class="prize-icon">${p.icon}</div><div class="prize-name">${p.full}</div><div class="prize-pct">${p.weight}%</div>`;
    listBody.appendChild(row);
  });

  /* ================= daily-limit persistence (client-side best effort) ================= */
  const DAY_MS = 24*60*60*1000;
  const KEY = 'krkn_last_spin';

  function readCookie(name){
    const m = document.cookie.match(new RegExp('(?:^|; )'+name+'=([^;]*)'));
    return m ? decodeURIComponent(m[1]) : null;
  }
  function writeCookie(name, value, maxAgeSec){
    document.cookie = `${name}=${encodeURIComponent(value)}; max-age=${maxAgeSec}; path=/; SameSite=Lax`;
  }
  function getLastSpin(){
    const ls = Number(localStorage.getItem(KEY)) || 0;
    const ck = Number(readCookie(KEY)) || 0;
    return Math.max(ls, ck);
  }
  function setLastSpin(ts){
    try{ localStorage.setItem(KEY, String(ts)); }catch(e){}
    writeCookie(KEY, String(ts), 400*24*60*60);
  }

  const spinBtn = document.getElementById('spinBtn');
  const wheelEl = document.getElementById('wheelSvg');
  const audio = document.getElementById('spinAudio');
  const resultBanner = document.getElementById('resultBanner');
  const resultPrize = document.getElementById('resultPrize');
  const infoBanner = document.getElementById('infoBanner');
  const infoText = document.getElementById('infoText');

  let currentRotation = 0;
  let countdownTimer = null;

  function formatRemaining(ms){
    const total = Math.max(0, Math.ceil(ms/1000));
    const h = String(Math.floor(total/3600)).padStart(2,'0');
    const m = String(Math.floor((total%3600)/60)).padStart(2,'0');
    const s = String(total%60).padStart(2,'0');
    return `${h}:${m}:${s}`;
  }

  function lockButton(){
    spinBtn.classList.add('disabled');
    infoBanner.classList.add('countdown');
    function tick(){
      const remaining = (getLastSpin() + DAY_MS) - Date.now();
      if(remaining <= 0){
        clearInterval(countdownTimer);
        unlockButton();
        return;
      }
      spinBtn.textContent = formatRemaining(remaining);
      infoText.innerHTML = `Следующая попытка через <b>${formatRemaining(remaining)}</b>`;
    }
    tick();
    countdownTimer = setInterval(tick, 1000);
  }

  function unlockButton(){
    spinBtn.classList.remove('disabled');
    infoBanner.classList.remove('countdown');
    spinBtn.textContent = 'КРУТИТЬ';
    infoText.innerHTML = 'Каждый день доступна <b>1 бесплатная попытка</b>';
  }

  function pickPrizeIndex(){
    const totalWeight = PRIZES.reduce((s,p)=>s+p.weight,0);
    let r = Math.random()*totalWeight;
    for(let i=0;i<PRIZES.length;i++){
      if(r < PRIZES[i].weight) return i;
      r -= PRIZES[i].weight;
    }
    return PRIZES.length-1;
  }

  /* ---------- confetti burst (monochrome, matches black/white theme) ---------- */
  function burstConfetti(){
    const colors = ['#0a0a0a','#2b2b2b','#555','#8a8a8a','#c9c9c9','#ffffff'];
    const originX = window.innerWidth/2;
    const originY = document.getElementById('spinBtn').getBoundingClientRect().top;
    const count = 46;
    for(let i=0;i<count;i++){
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const size = 5 + Math.random()*6;
      const isCircle = Math.random() > 0.5;
      el.style.width = size+'px';
      el.style.height = (isCircle ? size : size*2.4)+'px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.borderRadius = isCircle ? '50%' : '2px';
      const dx = (Math.random()-0.5) * 520;
      const dur = 1.6 + Math.random()*1.1;
      const delay = Math.random()*0.15;
      const rot = 360 + Math.random()*720 * (Math.random()>0.5?1:-1);
      const startX = originX + (Math.random()-0.5)*80;
      el.style.left = startX + 'px';
      el.style.top = originY + 'px';
      el.style.opacity = '0';
      document.body.appendChild(el);
      el.animate([
        { transform:'translate(0,0) rotate(0deg)', opacity:1, offset:0 },
        { transform:`translate(${dx*0.5}px, ${window.innerHeight*0.5}px) rotate(${rot*0.5}deg)`, opacity:1, offset:.6 },
        { transform:`translate(${dx}px, ${window.innerHeight*0.95}px) rotate(${rot}deg)`, opacity:0, offset:1 }
      ], { duration: dur*1000, delay: delay*1000, easing:'cubic-bezier(.25,.46,.45,.94)', fill:'forwards' });
      setTimeout(()=> el.remove(), (dur+delay)*1000 + 200);
    }
  }

  function spin(){
    if(spinBtn.classList.contains('disabled') || spinBtn.classList.contains('spinning')) return;

    const idx = pickPrizeIndex();
    const centerAngle = idx*SLICE + SLICE/2;
    const jitter = (Math.random()-0.5) * (SLICE*0.5);
    const fullSpins = 6*360;
    const target = fullSpins + (360 - centerAngle) + jitter;

    currentRotation += target;
    spinBtn.classList.add('spinning');
    resultBanner.classList.remove('show');

    audio.currentTime = 0;
    audio.play().catch(()=>{});

    wheelEl.style.transform = `rotate(${currentRotation}deg)`;

    const onEnd = () => {
      wheelEl.removeEventListener('transitionend', onEnd);
      audio.pause();
      audio.currentTime = 0;
      spinBtn.classList.remove('spinning');

      document.getElementById('resultIcon').textContent = PRIZES[idx].icon;
      resultPrize.textContent = PRIZES[idx].full;
      resultBanner.classList.remove('show');
      // force reflow so the reveal animations restart cleanly on repeated spins
      void resultBanner.offsetWidth;
      resultBanner.classList.add('show');
      burstConfetti();

      const now = Date.now();
      setLastSpin(now);
      lockButton();
    };
    wheelEl.addEventListener('transitionend', onEnd);
  }

  spinBtn.addEventListener('click', spin);

  /* init: check if already spun within 24h */
  const last = getLastSpin();
  if(last && (Date.now() - last) < DAY_MS){
    lockButton();
  }
</script>
</body>
</html>
