<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRAKEN</title>
<link rel="icon" href="1.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#ffffff;
    --white:#111111;
    --display:'Space Grotesk', sans-serif;
    --mono:'JetBrains Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#ffffff;
    color:#111111;
    font-family:var(--display);
    min-height:100svh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    display:flex;
    flex-direction:column;
  }
  a{color:inherit;text-decoration:none;}
  ::selection{background:#fff;color:#08080b;}

  /* ---------- nav ---------- */
  nav{
    position:relative;
    z-index:5;
    background:#ffffff;
    border-bottom:1px solid #ddd;
    padding:18px clamp(18px,4vw,42px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    min-height:160px;
  }
  nav .logo-mark{
    display:block;
    width:auto;
    height:clamp(150px,12vw,220px);
    object-fit:contain;
    flex-shrink:0;
    transition:transform .25s ease;
  }
  nav .logo-mark:hover{transform:scale(1.03);}
  nav .nav-right{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .pill-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#000000;
    color:#ffffff;
    border:none;
    border-radius:100px;
    padding:11px 20px;
    font-family:var(--display);
    font-weight:700;
    font-size:13.5px;
    letter-spacing:.01em;
    transition:background .25s ease;
    white-space:nowrap;
  }
  .pill-btn:hover{background:#222;}
  .pill-btn svg{flex-shrink:0;}
  .icon-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:42px;height:42px;
    border-radius:100px;
    background:#000000;
    border:1px solid #000000;
    color:#ffffff;
    transition:background .25s ease, border-color .25s ease;
    flex-shrink:0;
  }
  .icon-btn:hover{background:#000000;border-color:#d8d8d8;}
  @media (max-width:768px){
    nav{min-height:120px;padding:16px 18px;}
    nav .logo-mark{height:74px;}
    nav .nav-right{gap:8px;}
    .icon-btn{width:38px;height:38px;}
  }

  @media (max-width:480px){
    nav{flex-wrap:wrap;row-gap:10px;min-height:0;}
    nav .logo-mark{height:56px;}
    .pill-btn span.label{display:none;}
    .pill-btn{padding:11px;}
  }

  /* ---------- hero ---------- */
  .hero{
    position:relative;
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    overflow:hidden;
    padding:0 clamp(20px,5vw,64px);
  }
  .tendrils{position:absolute;inset:0;width:100%;height:100%;opacity:.5;z-index:0;}
  .tendrils path{
    fill:none;
    stroke:url(#tendrilGrad);
    stroke-width:1;
    stroke-linecap:round;
    stroke-dasharray:6 10;
    animation:drift 26s linear infinite;
  }
  .tendrils path:nth-child(2){animation-duration:34s;animation-direction:reverse;opacity:.6;}
  .tendrils path:nth-child(3){animation-duration:19s;opacity:.4;}
  @keyframes drift{ to{ stroke-dashoffset:-1000; } }

  .cursor-glow{
    position:absolute;
    width:520px;height:520px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.12) 0%, transparent 70%);
    pointer-events:none;
    transform:translate(-50%,-50%);
    left:50%;top:45%;
    transition:left .5s ease-out, top .5s ease-out;
    filter:blur(4px);
    z-index:0;
  }

  .hero-inner{position:relative;z-index:2;}

  .wordmark{
    font-weight:700;
    font-size:clamp(64px, 16vw, 240px);
    line-height:.9;
    letter-spacing:-.03em;
    display:flex;
    overflow:hidden;
  }
  .wordmark span{
    display:inline-block;
    transform:translateY(110%);
    animation:riseIn .9s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .wordmark span:nth-child(1){animation-delay:.1s;}
  .wordmark span:nth-child(2){animation-delay:.17s;}
  .wordmark span:nth-child(3){animation-delay:.24s;}
  .wordmark span:nth-child(4){animation-delay:.31s;}
  .wordmark span:nth-child(5){animation-delay:.38s;}
  .wordmark span:nth-child(6){animation-delay:.45s;}
  @keyframes riseIn{ to{ transform:translateY(0); opacity:1; } }

  /* ---------- CTA buttons (config-driven links) ---------- */
  .cta-row{
    margin-top:52px;
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    opacity:0;
    animation:riseIn .8s .6s ease forwards;
  }
  .cta-btn{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:19px 36px;
    font-family:var(--display);
    font-weight:700;
    font-size:15px;
    letter-spacing:.02em;
    text-transform:uppercase;
    border-radius:100px;
    overflow:hidden;
    isolation:isolate;
    cursor:pointer;
    transition:transform .3s cubic-bezier(.2,.8,.2,1), color .35s ease;
  }
  .cta-btn:active{transform:scale(.97);}
  .cta-btn::before{
    content:'';
    position:absolute;
    inset:0;
    z-index:-1;
    transition:transform .45s cubic-bezier(.2,.8,.2,1);
  }
  .cta-btn.primary{
    background:#000;
    color:#fff;
    border:2px solid #000;
}
.cta-btn.primary::before{display:none;}
.cta-btn.primary:hover{background:#222;color:#fff;}

  .cta-btn.ghost{
    background:#000;
    color:#fff;
    border:2px solid #000;
}
.cta-btn.ghost::before{display:none;}
.cta-btn.ghost:hover{background:#222;color:#fff;border-color:#000;}

  .cta-btn.outline{
    background:#fff;
    color:#000;
    border:2px solid #000;
  }
  .cta-btn.outline::before{display:none;}
  .cta-btn.outline:hover{background:#f2f2f2;}
  .cta-btn.outline .wheel-ic{flex-shrink:0;}

  .cta-btn .arrow{transition:transform .3s ease;}
  .cta-btn:hover .arrow{transform:translateX(3px);}

  /* ---------- footer ---------- */
  footer{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    font-family:var(--mono);
    font-size:11px;
    color:#555;
    padding:22px clamp(20px,5vw,64px) 30px;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important;}
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(#efefef 1px,transparent 1px),
      linear-gradient(90deg,#efefef 1px,transparent 1px);
    background-size:48px 48px;
    opacity:.6;
    z-index:-1;
  }
  body::after{
    content:"";
    position:fixed;
    inset:18px;
    border:1px solid #e6e6e6;
    pointer-events:none;
    z-index:10;
  }
  .hero::before,.hero::after{
    content:"";
    position:absolute;
    top:0;bottom:0;
    width:1px;
    background:#ececec;
    z-index:1;
  }
  .hero::before{left:48px;}
  .hero::after{right:48px;}
  .hero-inner{max-width:1400px;width:100%;margin:auto;}
  .cta-row{padding-top:28px;border-top:1px solid #e8e8e8;}
  nav{box-shadow:0 8px 30px rgba(0,0,0,.04);}

    display:block;
    overflow:hidden;
    background:#0c0a0d;
    padding:clamp(30px,6vw,52px) 20px;
    text-align:center;
    isolation:isolate;
    transition:filter .25s ease;
  }
  .hiring-banner:hover{filter:brightness(1.08);}

  .hiring-banner::after{
    content:'';
    position:absolute;
    inset:0;
    background:radial-gradient(ellipse at 50% 0%, rgba(236,25,92,.16), transparent 65%);

    pointer-events:none;
  }
  .hb-logo{
    position:relative;
    z-index:1;
    height:clamp(34px,5vw,48px);
    width:auto;
    margin:0 auto 18px;
    display:block;
  }
  .hb-title{
    position:relative;
    z-index:1;
    font-weight:700;
    line-height:1.05;
    letter-spacing:-.01em;
  }
  .hb-title .l1{
    display:block;
    color:#fff;
    font-size:clamp(24px,4.4vw,42px);
  }
  .hb-title .l2{
    display:block;
    color:#ec1c5c;
    font-size:clamp(30px,6vw,56px);
    margin-top:2px;
  }
  .hb-divider{
    position:relative;
    z-index:1;
    width:min(320px,70%);
    height:1px;
    margin:20px auto;
    background:linear-gradient(to right, transparent, rgba(255,255,255,.35), transparent);
  }
  .hb-divider i{
    position:absolute;
    left:50%;top:50%;
    width:7px;height:7px;
    margin:-3.5px 0 0 -3.5px;
    border-radius:50%;
    background:#ec1c5c;
    box-shadow:0 0 10px 3px rgba(236,28,92,.8);
    animation:hbDotPulse 2s ease-in-out infinite;
  }
  @keyframes hbDotPulse{
    0%,100%{ box-shadow:0 0 10px 3px rgba(236,28,92,.8); }
    50%{ box-shadow:0 0 16px 6px rgba(236,28,92,1); }
  }
  .hb-sub{
    position:relative;
    z-index:1;
    color:#cfcfd4;
    font-size:clamp(13px,1.8vw,15px);
  }

  /* ---------- roulette teaser (homepage) ---------- */
  .roulette-teaser{
    position:relative;
    z-index:2;
    padding:0 clamp(20px,5vw,64px) 70px;
  }
  .roulette-card{
    display:block;
    max-width:640px;
    border:1px solid #eaeaea;
    border-radius:22px;
    padding:34px clamp(20px,4vw,40px) 0;
    overflow:hidden;
    transition:border-color .25s ease, transform .25s ease;
  }
  .roulette-card:hover{border-color:#ccc;transform:translateY(-2px);}
  .roulette-card h2{
    font-weight:700;
    font-size:clamp(26px,4vw,36px);
    letter-spacing:-.01em;
  }
  .roulette-card p{
    color:#666;
    font-size:14.5px;
    margin-top:6px;
  }
  .teaser-wheel-crop{
    height:170px;
    overflow:hidden;
    margin-top:20px;
    position:relative;
    display:flex;
    justify-content:center;
  }
  .teaser-wheel-crop svg{
    width:340px;
    flex-shrink:0;
    transform:translateY(4%);
  }
  .teaser-wheel-crop::after{
    content:'';
    position:absolute;
    left:0;right:0;bottom:0;height:60px;
    background:linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,.94));
  }

    managerUrl:    "https://t.me/krkn_oper"        // ссылка кнопки "Менеджер"

  /* ====================================================== */

  /* ---------- static roulette preview on homepage ---------- */
  (function drawTeaserWheel(){
    const PRIZES = [
      { label:"СКИДКА 20%", icon:"%" },
      { label:"СКИДКА 15%", icon:"%" },
      { label:"БОНУС", icon:"🎁" },
      { label:"ПОПРОБУЙ ЕЩЁ", icon:"↻" },
      { label:"СКИДКА 10%", icon:"%" },
      { label:"FREE", icon:"📦" },
    ];
    const SLICE = 360/PRIZES.length;
    const svgNS = "http://www.w3.org/2000/svg";
    const svg = document.getElementById('teaserWheel');
    if(!svg) return;
    const CX=200, CY=200, R=190;
    function polar(cx,cy,r,a){ const rad=(a-90)*Math.PI/180; return [cx+r*Math.cos(rad), cy+r*Math.sin(rad)]; }
    PRIZES.forEach((p,i)=>{
      const startA=i*SLICE, endA=(i+1)*SLICE;
      const [x1,y1]=polar(CX,CY,R,startA), [x2,y2]=polar(CX,CY,R,endA);
      const path=document.createElementNS(svgNS,'path');
      path.setAttribute('d', `M${CX},${CY} L${x1},${y1} A${R},${R} 0 0 1 ${x2},${y2} Z`);
      path.setAttribute('fill', i%2===0 ? '#141414' : '#0a0a0a');
      path.setAttribute('stroke', '#ffffff');
      path.setAttribute('stroke-width', '2.5');
      svg.appendChild(path);

      const midA=startA+SLICE/2;
      const [tx,ty]=polar(CX,CY,R*0.62,midA);
      const g=document.createElementNS(svgNS,'g');
      g.setAttribute('transform', `translate(${tx},${ty}) rotate(${midA})`);
      const icon=document.createElementNS(svgNS,'text');
      icon.setAttribute('text-anchor','middle'); icon.setAttribute('y','-8'); icon.setAttribute('font-size','20');
      icon.textContent=p.icon; g.appendChild(icon);
      const label=document.createElementNS(svgNS,'text');
      label.setAttribute('text-anchor','middle'); label.setAttribute('y','15');
      label.setAttribute('font-family',"'Space Grotesk', sans-serif");
      label.setAttribute('font-weight','700'); label.setAttribute('font-size','13'); label.setAttribute('fill','#fff');
      label.textContent=p.label; g.appendChild(label);
      svg.appendChild(g);
    });
    const ring=document.createElementNS(svgNS,'circle');
    ring.setAttribute('cx',CX); ring.setAttribute('cy',CY); ring.setAttribute('r',R-1.5);
    ring.setAttribute('fill','none'); ring.setAttribute('stroke','#0a0a0a'); ring.setAttribute('stroke-width','5');
    svg.appendChild(ring);
  })();

  // cursor glow within hero
  const hero = document.getElementById('hero');
  const glow = document.getElementById('cursorGlow');
  hero.addEventListener('mousemove', (e)=>{
    const r = hero.getBoundingClientRect();
    glow.style.left = (e.clientX - r.left) + 'px';
    glow.style.top = (e.clientY - r.top) + 'px';
  });
</script>
