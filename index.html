<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRAKEN</title>
<link rel="icon" href="1.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#ffffff;
    --white:#111111;
    --display:'Space Grotesk', sans-serif;
    --mono:'JetBrains Mono', monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#ffffff;
    color:#111111;
    font-family:var(--display);
    min-height:100svh;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
    display:flex;
    flex-direction:column;
  }
  a{color:inherit;text-decoration:none;}
  ::selection{background:#fff;color:#08080b;}

  /* ---------- nav ---------- */
  nav{
    position:relative;
    z-index:5;
    background:#ffffff;
    border-bottom:1px solid #ddd;
    padding:18px clamp(18px,4vw,42px);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    min-height:160px;
  }
  nav .logo-mark{
    display:block;
    width:auto;
    height:clamp(150px,12vw,220px);
    object-fit:contain;
    flex-shrink:0;
    transition:transform .25s ease;
  }
  nav .logo-mark:hover{transform:scale(1.03);}
  nav .nav-right{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .pill-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#000000;
    color:#ffffff;
    border:none;
    border-radius:100px;
    padding:11px 20px;
    font-family:var(--display);
    font-weight:700;
    font-size:13.5px;
    letter-spacing:.01em;
    transition:background .25s ease;
    white-space:nowrap;
  }
  .pill-btn:hover{background:#222;}
  .pill-btn svg{flex-shrink:0;}
  .icon-btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:42px;height:42px;
    border-radius:100px;
    background:#000000;
    border:1px solid #000000;
    color:#ffffff;
    transition:background .25s ease, border-color .25s ease;
    flex-shrink:0;
  }
  .icon-btn:hover{background:#000000;border-color:#d8d8d8;}
  @media (max-width:768px){
    nav{min-height:120px;padding:16px 18px;}
    nav .logo-mark{height:90px;}
  }

  @media (max-width:480px){
    .pill-btn span.label{display:none;}
    .pill-btn{padding:11px;}
  }

  /* ---------- hero ---------- */
  .hero{
    position:relative;
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    overflow:hidden;
    padding:0 clamp(20px,5vw,64px);
  }
  .tendrils{position:absolute;inset:0;width:100%;height:100%;opacity:.5;z-index:0;}
  .tendrils path{
    fill:none;
    stroke:url(#tendrilGrad);
    stroke-width:1;
    stroke-linecap:round;
    stroke-dasharray:6 10;
    animation:drift 26s linear infinite;
  }
  .tendrils path:nth-child(2){animation-duration:34s;animation-direction:reverse;opacity:.6;}
  .tendrils path:nth-child(3){animation-duration:19s;opacity:.4;}
  @keyframes drift{ to{ stroke-dashoffset:-1000; } }

  .cursor-glow{
    position:absolute;
    width:520px;height:520px;
    border-radius:50%;
    background:radial-gradient(circle, rgba(255,255,255,.12) 0%, transparent 70%);
    pointer-events:none;
    transform:translate(-50%,-50%);
    left:50%;top:45%;
    transition:left .5s ease-out, top .5s ease-out;
    filter:blur(4px);
    z-index:0;
  }

  .hero-inner{position:relative;z-index:2;}

  .wordmark{
    font-weight:700;
    font-size:clamp(64px, 16vw, 240px);
    line-height:.9;
    letter-spacing:-.03em;
    display:flex;
    overflow:hidden;
  }
  .wordmark span{
    display:inline-block;
    transform:translateY(110%);
    animation:riseIn .9s cubic-bezier(.2,.8,.2,1) forwards;
  }
  .wordmark span:nth-child(1){animation-delay:.1s;}
  .wordmark span:nth-child(2){animation-delay:.17s;}
  .wordmark span:nth-child(3){animation-delay:.24s;}
  .wordmark span:nth-child(4){animation-delay:.31s;}
  .wordmark span:nth-child(5){animation-delay:.38s;}
  .wordmark span:nth-child(6){animation-delay:.45s;}
  @keyframes riseIn{ to{ transform:translateY(0); opacity:1; } }

  /* ---------- CTA buttons (config-driven links) ---------- */
  .cta-row{
    margin-top:52px;
    display:flex;
    gap:16px;
    flex-wrap:wrap;
    opacity:0;
    animation:riseIn .8s .6s ease forwards;
  }
  .cta-btn{
    position:relative;
    display:inline-flex;
    align-items:center;
    gap:10px;
    padding:19px 36px;
    font-family:var(--display);
    font-weight:700;
    font-size:15px;
    letter-spacing:.02em;
    text-transform:uppercase;
    border-radius:100px;
    overflow:hidden;
    isolation:isolate;
    cursor:pointer;
    transition:transform .3s cubic-bezier(.2,.8,.2,1), color .35s ease;
  }
  .cta-btn:active{transform:scale(.97);}
  .cta-btn::before{
    content:'';
    position:absolute;
    inset:0;
    z-index:-1;
    transition:transform .45s cubic-bezier(.2,.8,.2,1);
  }
  .cta-btn.primary{
    background:#000;
    color:#fff;
    border:2px solid #000;
}
.cta-btn.primary::before{display:none;}
.cta-btn.primary:hover{background:#222;color:#fff;}

  .cta-btn.ghost{
    background:#000;
    color:#fff;
    border:2px solid #000;
}
.cta-btn.ghost::before{display:none;}
.cta-btn.ghost:hover{background:#222;color:#fff;border-color:#000;}

  .cta-btn .arrow{transition:transform .3s ease;}
  .cta-btn:hover .arrow{transform:translateX(3px);}

  /* ---------- footer ---------- */
  footer{
    position:relative;
    z-index:2;
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    font-family:var(--mono);
    font-size:11px;
    color:#555;
    padding:22px clamp(20px,5vw,64px) 30px;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important; animation-iteration-count:1 !important; transition-duration:.01ms !important;}
  }

  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:
      linear-gradient(#efefef 1px,transparent 1px),
      linear-gradient(90deg,#efefef 1px,transparent 1px);
    background-size:48px 48px;
    opacity:.6;
    z-index:-1;
  }
  body::after{
    content:"";
    position:fixed;
    inset:18px;
    border:1px solid #e6e6e6;
    pointer-events:none;
    z-index:10;
  }
  .hero::before,.hero::after{
    content:"";
    position:absolute;
    top:0;bottom:0;
    width:1px;
    background:#ececec;
    z-index:1;
  }
  .hero::before{left:48px;}
  .hero::after{right:48px;}
  .hero-inner{max-width:1400px;width:100%;margin:auto;}
  .cta-row{padding-top:28px;border-top:1px solid #e8e8e8;}
  nav{box-shadow:0 8px 30px rgba(0,0,0,.04);}

</style>
</head>
<body>

  <nav>
    <img src="1.png" alt="KRAKEN" class="logo-mark">
    <div class="nav-right">
      <a class="pill-btn" data-cta="assortment" href="#" target="_blank" rel="noopener">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"></rect>
          <rect x="14" y="3" width="7" height="7" rx="1.5"></rect>
          <rect x="3" y="14" width="7" height="7" rx="1.5"></rect>
          <rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
        </svg>
        <span class="label">Ассортимент</span>
      </a>
      <a class="icon-btn" data-cta="manager" href="#" target="_blank" rel="noopener" aria-label="Менеджер" title="Менеджер">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" y1="7" x2="14" y2="7"></line>
          <line x1="4" y1="12" x2="20" y2="12"></line>
          <line x1="4" y1="17" x2="16" y2="17"></line>
        </svg>
      </a>
      <a class="icon-btn" href="gallery.html" aria-label="Галерея" title="Галерея">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <path d="M21 15l-5-5L5 21"></path>
        </svg>
      </a>
    </div>
  </nav>

  <header class="hero" id="hero">
    <svg class="tendrils" viewBox="0 0 1200 800" preserveAspectRatio="none">
      <defs>
        <linearGradient id="tendrilGrad" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stop-color="#ffffff"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="M -50 620 C 200 550, 300 700, 550 600 S 900 480, 1250 560"/>
      <path d="M -50 200 C 250 260, 350 120, 620 200 S 950 320, 1250 180"/>
      <path d="M -50 420 C 200 380, 420 480, 700 400 S 1000 360, 1250 430"/>
    </svg>
    <div class="cursor-glow" id="cursorGlow"></div>

    <div class="hero-inner">
      <h1 class="wordmark" aria-label="KRAKEN">
        <span>K</span><span>R</span><span>A</span><span>K</span><span>E</span><span>N</span>
      </h1>

      <div class="cta-row">
        <a class="cta-btn primary" data-cta="assortment" href="#" target="_blank" rel="noopener">Ассортимент <span class="arrow">→</span></a>
        <a class="cta-btn ghost" data-cta="manager" href="#" target="_blank" rel="noopener">Менеджер <span class="arrow">→</span></a>
        <a class="cta-btn ghost" href="gallery.html">Галерея <span class="arrow">→</span></a>
      </div>
    </div>
  </header>

  

<script>
  /* ======================================================
     КОНФИГ ССЫЛОК — меняйте только этот блок
     ====================================================== */
  const CONFIG = {
    assortmentUrl: "https://teletype.in/@bless-yo-trap/T_jMiz2CQbh", // ссылка кнопки "Ассортимент"
    managerUrl:    "https://t.me/krkn_oper"        // ссылка кнопки "Менеджер"
  };
  document.querySelectorAll('[data-cta="assortment"]').forEach(el => el.href = CONFIG.assortmentUrl);
  document.querySelectorAll('[data-cta="manager"]').forEach(el => el.href = CONFIG.managerUrl);
  /* ====================================================== */

  // cursor glow within hero
  const hero = document.getElementById('hero');
  const glow = document.getElementById('cursorGlow');
  hero.addEventListener('mousemove', (e)=>{
    const r = hero.getBoundingClientRect();
    glow.style.left = (e.clientX - r.left) + 'px';
    glow.style.top = (e.clientY - r.top) + 'px';
  });
</script>
</body>
</html>
